<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evaluation Detail | Car Flip Analyzer</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    {% include "_top_bar.html" %}
    <main class="shell shell-narrow">
      <section class="composer panel full-evaluation-hero">
        <p class="deal-kicker">Saved Detail</p>
        <h1 id="portfolio-detail-title">Evaluation Detail</h1>
        <p id="portfolio-detail-subtitle" class="full-evaluation-copy">
          Loading saved evaluation...
        </p>
      </section>

      <section class="panel">
        <div class="results-head">
          <strong>Overview</strong>
          <div class="portfolio-detail-actions">
            <button id="portfolio-delete-button" type="button" class="ghost-button danger-button">Delete Evaluation</button>
            <a class="proceed-button secondary compact-button" href="{{ url_for('portfolio') }}">Back to Portfolio</a>
          </div>
        </div>
        <div id="portfolio-detail-overview" class="full-evaluation-summary-grid muted">
          Saved evaluation stats will appear here.
        </div>
      </section>

      <section class="panel">
        <div class="results-head">
          <strong>Add Final Buy Price</strong>
        </div>
        <div class="full-evaluation-stack">
          <label class="full-evaluation-label">
            <span>Final Buy Price</span>
            <input id="portfolio-final-buy-price" type="number" min="0" step="100" placeholder="Add or update the final buy price" />
          </label>
          <div class="favorite-evaluation-wrap">
            <button id="portfolio-update-button" type="button" class="button">Update Saved Evaluation</button>
            <span id="portfolio-update-status" class="muted"></span>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="results-head">
          <strong>Saved Evaluation Breakdown</strong>
        </div>
        <details class="portfolio-deep-stats" open>
          <summary>Deep Stats</summary>
          <div id="portfolio-detail-sections" class="portfolio-detail-sections muted">
            Full saved statistics will appear here.
          </div>
        </details>
      </section>
    </main>
    <script>
      window.PORTFOLIO_EVALUATION_ID = {{ evaluation_id|tojson }};
    </script>
    <script src="{{ url_for('static', filename='nav.js') }}"></script>
    <script src="{{ url_for('static', filename='software_chat.js') }}"></script>
    <script src="{{ url_for('static', filename='portfolio_detail.js') }}"></script>
  </body>
</html>

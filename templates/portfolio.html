<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evaluation Portfolio | Car Flip Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    {% include "_top_bar.html" %}
    <main class="shell shell-narrow">
      <section class="composer panel full-evaluation-hero">
        <p class="deal-kicker">Saved Evaluations</p>
        <h1>Evaluation Portfolio</h1>
        <p class="full-evaluation-copy">
          Every saved deal lives here. Open any vehicle to see the complete front-evaluation data and the full buy-price analysis snapshot.
        </p>
      </section>

      <section class="panel">
        <div class="results-head">
          <strong>Saved Cars</strong>
          <a class="proceed-button secondary compact-button" href="{{ url_for('index') }}">Back to Analyzer</a>
        </div>
        <p id="portfolio-action-status" class="muted"></p>
        <div id="portfolio-list" class="portfolio-grid muted">
          Saved evaluations will appear here.
        </div>
      </section>
    </main>
    <script src="{{ url_for('static', filename='nav.js') }}"></script>
    <script src="{{ url_for('static', filename='software_chat.js') }}"></script>
    <script src="{{ url_for('static', filename='portfolio.js') }}"></script>
  </body>
</html>

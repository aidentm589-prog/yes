<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | Car Flip Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <main class="shell shell-narrow">
      <section class="composer panel full-evaluation-hero">
        <p class="deal-kicker">New Account</p>
        <h1>Create Account</h1>
        <p class="full-evaluation-copy">New users start on Tier 1 and receive 1 free Individual Evaluation credit every 24 hours.</p>
      </section>
      <section class="panel">
        <form method="post" action="{{ url_for('signup_post') }}" class="composer-form auth-form">
          <label class="full listing-price-field">
            <span class="input-label-text">First Name</span>
            <input name="first_name" type="text" required placeholder="First name" />
          </label>
          <label class="full listing-price-field">
            <span class="input-label-text">Email</span>
            <input name="email" type="email" required placeholder="you@example.com" />
          </label>
          <label class="full listing-price-field">
            <span class="input-label-text">Password</span>
            <input name="password" type="password" required minlength="8" placeholder="At least 8 characters" />
          </label>
          {% if error %}
            <p class="auth-error">{{ error }}</p>
          {% endif %}
          <div class="actions auth-actions">
            <button type="submit" class="button">Create Account</button>
            <a class="proceed-button secondary compact-button" href="{{ url_for('login') }}">Log In</a>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
